schemaVersion: 1.0.0
sourceId: usda-nass-quickstats
adapterId: usda-nass-quickstats-import-v1
displayName: USDA NASS Quick Stats
lifecycle: active
internalResearchApproved: true
releaseMembership: true
datasets: [annual-crop-production]
claimPolicy:
  permitted: [Agricultural statistics with commodity, geography, period, unit, and revision metadata]
  forbidden: [Replacing suppressed values with estimates or presenting preliminary data as final]
scope: { merchantIds: [usda-nass] }
enabledByDefault: false
publicActivationApproved: false
legalBasis:
  type: reviewed-public-dataset
  termsUrl: https://www.nass.usda.gov/About_NASS/Policies_and_Links/index.php
  documentationUrl: https://quickstats.nass.usda.gov/api
  termsExpiresAt: 2027-07-23
  accountApprovalRequired: false
review:
  reviewedAt: 2026-07-23
  reviewedBy: codex-provider-activation
  reviewDueAt: 2027-07-23
  evidenceIds: [usda-nass-api-review-2026-07-23]
  comparisonStatus: approved
credentials: { required: true, secretNames: [HOWBISCUIT_NASS_API_KEY], clientExposureAllowed: false }
storage:
  productIdentifier: { allowed: false, maximumSeconds: 0 }
  storeIdentifier: { allowed: false, maximumSeconds: 0 }
  price: { allowed: false, maximumSeconds: 0 }
  availability: { allowed: false, maximumSeconds: 0 }
  image: { allowed: false, maximumSeconds: 0 }
  rawResponse: { allowed: false, maximumSeconds: 0 }
display: { attributionRequired: true, timestampRequired: true, merchantNameRequired: false, logoRequired: false, affiliateDisclosureRequired: false, directLinkRequired: true }
refresh: { normalTtlSeconds: 2592000, hardExpirySeconds: 31536000, staleWhileRevalidateAllowed: false }
limits: { requestsPerSecond: 1, requestsPerDay: 1000, applicationDailyBudget: 50, applicationMonthlyBudget: 1000, paidMonthlyCeilingUsd: 0 }
matching: { acceptedConfidence: [verified-model-variant], probableMayCompare: false }
failure: { showStalePrice: false, fallback: no-price, automaticDisableAfterConsecutiveFailures: 3, cooldownSeconds: 3600, maximumRetryCount: 2, disableOnTermsExpiry: true, disableOnAuthenticationFailure: true, disableOnBudgetExhaustion: true }
killSwitch: { environmentVariable: USDA_NASS_ENABLED, databaseDisableAllowed: true }
