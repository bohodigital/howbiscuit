schemaVersion: 1.0.0
sourceId: hud-usps-crosswalk
adapterId: hud-usps-crosswalk-import-v1
displayName: HUD USER USPS ZIP Code Crosswalk
lifecycle: active
internalResearchApproved: true
releaseMembership: true
datasets:
  - zip-county
  - zip-cbsa
claimPolicy:
  permitted:
    - ZIP-to-county and ZIP-to-CBSA residential-address relationships with source date
  forbidden:
    - Exact household location or precise user-location claims
scope:
  merchantIds:
    - hud-usps
enabledByDefault: false
publicActivationApproved: true
legalBasis:
  type: official-api
  termsUrl: https://www.huduser.gov/portal/dataset/uspszip-api.html
  documentationUrl: https://www.huduser.gov/portal/dataset/uspszip-api.html
  termsExpiresAt: 2027-07-23
  accountApprovalRequired: true
review:
  reviewedAt: 2026-07-23
  reviewedBy: codex-provider-activation
  reviewDueAt: 2027-07-23
  evidenceIds:
    - hud-usps-api-docs-review-2026-07-23
    - hud-usps-live-contract-review-2026-07-23
    - hud-usps-privacy-review-2026-07-23
  comparisonStatus: approved
credentials:
  required: true
  secretNames:
    - HOWBISCUIT_HUD_USPS_ACCESS_TOKEN
  clientExposureAllowed: false
storage:
  productIdentifier: { allowed: false, maximumSeconds: 0 }
  storeIdentifier: { allowed: false, maximumSeconds: 0 }
  price: { allowed: false, maximumSeconds: 0 }
  availability: { allowed: false, maximumSeconds: 0 }
  image: { allowed: false, maximumSeconds: 0 }
  rawResponse: { allowed: false, maximumSeconds: 0 }
display:
  attributionRequired: true
  timestampRequired: true
  merchantNameRequired: false
  logoRequired: false
  affiliateDisclosureRequired: false
  directLinkRequired: true
refresh:
  normalTtlSeconds: 2592000
  hardExpirySeconds: 10368000
  staleWhileRevalidateAllowed: false
limits:
  requestsPerSecond: 0.5
  requestsPerDay: 100
  applicationDailyBudget: 20
  applicationMonthlyBudget: 60
  paidMonthlyCeilingUsd: 0
matching:
  acceptedConfidence:
    - verified-model-variant
  probableMayCompare: false
failure:
  showStalePrice: false
  fallback: no-price
  automaticDisableAfterConsecutiveFailures: 3
  cooldownSeconds: 3600
  maximumRetryCount: 1
  disableOnTermsExpiry: true
  disableOnAuthenticationFailure: true
  disableOnBudgetExhaustion: true
killSwitch:
  environmentVariable: HUD_USPS_ENABLED
  databaseDisableAllowed: true
