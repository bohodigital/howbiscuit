title: How Does Baking Powder Work?
description: Baking powder makes batter and dough rise by producing carbon dioxide bubbles. Here is what triggers it, what goes wrong, and how to test your can.
articleType: guide
categoryId: kitchen
topicIds:
  - food-science
problemLabels:
  - My baking powder is not working
directAnswer: Baking powder combines a dry acid and base that release carbon dioxide after liquid is added; heat expands those bubbles while the batter or dough sets around them.
